apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: calc-namespace
  labels:
    project: calc
    division: finance
spec:
  replicas: 2
  selector:
    matchLabels:
      project: calc
      division: finance
  template:
    metadata:
      labels:
        project: calc
        division: finance
    spec:
      containers:
        - name: frontend
          image: muralielavarthi/frontend:1.0.0
          envFrom:
            - configMapRef:
                name: frontend-config
