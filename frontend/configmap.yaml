apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: calc-namespace
  labels:
    project: calc
    division: finance
data:
  nginx.conf: |
    user nginx;
    pid /tmp/nginx.pid;

    events {}

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        sendfile on;
        keepalive_timeout 65;

        server {
            listen 80;

            location / {
                root /usr/share/nginx/html;
                index index.html;
            }

            location /api/ {
                proxy_pass http://backend:8080/;
            }
        }
    }
