apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  namespace: calc-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      Project: calc
      division: finance
  template:
    metadata:
      labels:
        Project: calc
        division: finance
    spec:
      containers:
        - name: mysql
          image: muralielavarthi/mysql:1.0.0
